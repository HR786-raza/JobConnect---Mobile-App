name: jobconnect
description: A smart job portal with AI-based features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  firebase_analytics: ^11.4.4
  
  # Device info & permissions
  device_info_plus: ^11.3.3
  permission_handler: ^11.4.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  
  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  
  # State Management
  provider: ^6.1.2
  
  # Authentication
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^6.2.0  # Downgraded for compatibility
  
  # Image & File
  image_picker: ^1.1.2
  file_picker: ^8.3.5
  path_provider: ^2.1.5
  
  # PDF Generation
  pdf: ^3.11.3
  printing: ^5.13.4
  
  # Local Storage
  shared_preferences: ^2.5.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  
  # Localization
  flutter_localizations:
    sdk: flutter
  
  # Utilities
  url_launcher: ^6.3.1
  http: ^1.3.0
  
  # Chat
  flutter_chat_ui: ^1.6.15
  flutter_chat_types: ^3.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - web/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700